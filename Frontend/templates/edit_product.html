{% extends 'base.html' %}
{% block content %}

<div style="max-width:520px; margin:0 auto;">
    <div style="margin-bottom:28px;">
        <h1 style="font-family:var(--font-head); font-size:26px; font-weight:800; color:var(--text); letter-spacing:-0.6px; margin-bottom:6px;">Edit Product</h1>
        <p style="color:var(--text-muted); font-size:14px;">Update your product details below.</p>
    </div>
    <div class="card">
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" value="{{ product[1] }}" required />
            </div>
            <div class="form-group">
                <label>Price (Rs)</label>
                <input type="number" name="price" step="0.01" min="1" value="{{ product[2] }}" required />
            </div>
            <div class="form-group">
                <label>Stock Quantity</label>
                <input type="number" name="stock" min="0" value="{{ product[3] }}" required />
            </div>
            <div class="form-group">
                <label>Status</label>
                <select name="status">
                    <option value="active"   {% if product[4] == 'active'   %}selected{% endif %}>Active</option>
                    <option value="inactive" {% if product[4] == 'inactive' %}selected{% endif %}>Inactive</option>
                </select>
            </div>
            <div class="form-group">
                <label>Product Image</label>

                <!-- Show current image if exists -->
                {% if product[5] %}
                <div style="margin-bottom:10px;">
                    <p style="font-size:11px; color:var(--text-muted); margin-bottom:6px;">Current image:</p>
                    <img src="{{ url_for('static', filename='product_images/' + product[5]) }}"
                         style="width:100%; max-height:180px; object-fit:cover;
                                border-radius:8px; border:1px solid rgba(255,255,255,0.1);" />
                </div>
                {% endif %}

                <input type="file" name="image" accept="image/png,image/jpeg,image/jpg,image/webp"
                       style="padding:8px 12px; cursor:pointer;" />
                <p style="font-size:11px; color:var(--text-muted); margin-top:5px;">
                    Upload a new image to replace the current one. Leave empty to keep existing.
                </p>
            </div>

            <!-- New image preview -->
            <div id="preview-wrap" style="display:none; margin-bottom:16px;">
                <p style="font-size:11px; color:var(--text-muted); margin-bottom:6px;">New image preview:</p>
                <img id="preview-img"
                     style="width:100%; max-height:180px; object-fit:cover;
                            border-radius:8px; border:1px solid rgba(244,63,94,0.3);" />
            </div>

            <div style="display:flex; gap:10px; margin-top:8px;">
                <a href="{{ url_for('seller_dashboard') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-success" style="flex:1;">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<script>
document.querySelector('input[name="image"]').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
            document.getElementById('preview-img').src = ev.target.result;
            document.getElementById('preview-wrap').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
});
</script>

{% endblock %}
