{% extends 'base.html' %}
{% block content %}

<div style="max-width:520px; margin:0 auto;">
    <div style="margin-bottom:28px;">
        <h1 style="font-family:var(--font-head); font-size:26px; font-weight:800; color:var(--text); letter-spacing:-0.6px; margin-bottom:6px;">Add New Product</h1>
        <p style="color:var(--text-muted); font-size:14px;">Fill in the details to list a new product.</p>
    </div>
    <div class="card">
        <form method="POST" enctype="multipart/form-data">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" name="name" placeholder="e.g. Wireless Earbuds" required />
            </div>
            <div class="form-group">
                <label>Price (Rs)</label>
                <input type="number" name="price" step="0.01" min="1" placeholder="e.g. 2500.00" required />
            </div>
            <div class="form-group">
                <label>Stock Quantity</label>
                <input type="number" name="stock" min="0" placeholder="e.g. 50" required />
            </div>
            <div class="form-group">
                <label>Category</label>
                <select name="subcategory_id" required>
                    {% for sc in subcategories %}
                        <option value="{{ sc[0] }}">{{ sc[1] }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Product Image</label>
                <input type="file" name="image" accept="image/png,image/jpeg,image/jpg,image/webp"
                       style="padding:8px 12px; cursor:pointer;" />
                <p style="font-size:11px; color:var(--text-muted); margin-top:5px;">
                    Accepted: JPG, PNG, WEBP. Recommended: square image, min 400×400px.
                </p>
            </div>

            <!-- Image preview -->
            <div id="preview-wrap" style="display:none; margin-bottom:16px;">
                <img id="preview-img"
                     style="width:100%; max-height:200px; object-fit:cover;
                            border-radius:8px; border:1px solid rgba(255,255,255,0.1);" />
            </div>

            <div style="display:flex; gap:10px; margin-top:8px;">
                <a href="{{ url_for('seller_dashboard') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary" style="flex:1;">Add Product</button>
            </div>
        </form>
    </div>
</div>

<script>
document.querySelector('input[name="image"]').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = function(ev) {
            document.getElementById('preview-img').src = ev.target.result;
            document.getElementById('preview-wrap').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
});
</script>

{% endblock %}
