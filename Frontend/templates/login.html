{% extends 'base.html' %}
{% block content %}

<div style="max-width: 420px; margin: 60px auto;">
    <div style="text-align:center; margin-bottom: 32px;">
        <div style="font-size: 40px; margin-bottom: 12px;"></div>
        <h1 style="font-family: var(--font-head); font-size: 28px; font-weight: 800; color: var(--text); letter-spacing: -0.8px; margin-bottom: 8px;">Welcome back</h1>
        <p style="color: var(--text-muted); font-size: 14px;">Sign in to your MarketHub account</p>
    </div>
    <div class="card">
        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="you@email.com" required />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required />
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; padding:12px; font-size:15px; margin-top:4px;">
                Sign In →
            </button>
        </form>
        <p style="text-align:center; margin-top:20px; font-size:13.5px; color:var(--text-muted);">
            Don't have an account?
            <a href="{{ url_for('register') }}" style="color:var(--accent); font-weight:600; text-decoration:none;"> Register here</a>
        </p>
    </div>
</div>

{% endblock %}
