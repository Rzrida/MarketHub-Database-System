{% extends 'base.html' %}
{% block content %}

<div style="max-width:480px; margin:0 auto;">
    <div style="margin-bottom:28px;">
        <h1 style="font-family:var(--font-head); font-size:26px; font-weight:800; color:var(--text); letter-spacing:-0.6px; margin-bottom:6px;">⭐ Write a Review</h1>
        <p style="color:var(--text-muted); font-size:14px;">
            Product: <strong style="color:var(--text);">{{ product[0] if product else 'Unknown' }}</strong>
        </p>
    </div>
    <div class="card">
        <form method="POST">
            <div class="form-group">
                <label>Rating</label>
                <select name="rating" required>
                    <option value="5">⭐⭐⭐⭐⭐ — Excellent</option>
                    <option value="4">⭐⭐⭐⭐ — Good</option>
                    <option value="3">⭐⭐⭐ — Average</option>
                    <option value="2">⭐⭐ — Poor</option>
                    <option value="1">⭐ — Terrible</option>
                </select>
            </div>
            <div class="form-group">
                <label>Comment</label>
                <textarea name="comment" rows="4" placeholder="Share your experience..."></textarea>
            </div>
            <div style="display:flex; gap:10px;">
                <a href="{{ url_for('buyer_home') }}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary" style="flex:1;">Submit Review</button>
            </div>
        </form>
    </div>
</div>

{% endblock %}
